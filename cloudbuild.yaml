steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vibe2ship'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/vibe2ship'

  # Step 3: Deploy to Cloud Run
  # Env vars are configured directly on the Cloud Run service via the console.
  # This step only updates the container image.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'vibe2ship'
      - '--image=gcr.io/$PROJECT_ID/vibe2ship'
      - '--region=asia-south1'
      - '--platform=managed'

images:
  - 'gcr.io/$PROJECT_ID/vibe2ship'
